version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ../postgres/init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT}:6379"

  rc-api:
    image: rust:1.86
    working_dir: /workspace/rust
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    command: sh -c "cargo run -p rc-api"
    volumes:
      - ../../:/workspace
    ports:
      - "${RC_API_PORT}:8081"
    depends_on:
      - postgres
      - redis

  go-gateway:
    image: golang:1.23
    working_dir: /workspace/services/go-gateway
    command: sh -c "go run ./cmd/gateway"
    volumes:
      - ../../:/workspace
    ports:
      - "${GO_GATEWAY_PORT}:8080"
    depends_on:
      - rc-api

  go-bff:
    image: golang:1.23
    working_dir: /workspace/services/go-bff
    command: sh -c "go run ./cmd/bff"
    volumes:
      - ../../:/workspace
    ports:
      - "${GO_BFF_PORT}:8082"
    depends_on:
      - rc-api
